# Local DB servers for cross-DB verification of the dev app (see docs/multi-db-verification.md).
# The app itself runs on the host (`bun run dev`); this only provides Postgres + MongoDB.
#   docker compose up -d
# Connection strings match the defaults in src/lib/database/resolveAdapter.ts.
services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
      POSTGRES_DB: payload
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payload"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:8
    restart: unless-stopped
    command: ["--storageEngine=wiredTiger"]
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

volumes:
  pgdata:
  mongodata:
